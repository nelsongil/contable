name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Leer versión
        id: ver
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Comprobar si el tag ya existe
        id: tag_check
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q "v${VERSION}"; then
            echo "EXISTS=true" >> "$GITHUB_OUTPUT"
          else
            echo "EXISTS=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Construir ZIP limpio
        if: steps.tag_check.outputs.EXISTS == 'false'
        id: zip
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          ZIP="contable_v${VERSION}.zip"

          zip -r "$ZIP" . \
            --exclude "*.git/*" \
            --exclude "*.git" \
            --exclude ".claude/*" \
            --exclude ".agent/*" \
            --exclude "tools/*" \
            --exclude "backups/*" \
            --exclude ".well-known/*" \
            --exclude "config/database.php" \
            --exclude "config/.installed" \
            --exclude "*.zip" \
            --exclude ".gitignore" \
            --exclude "error_log" \
            --exclude "Thumbs.db" \
            --exclude "CLAUDE.md" \
            --exclude "AGENTS.md" \
            --exclude "CONVENTIONS.md" \
            --exclude "DATABASE.md" \
            --exclude "SECURITY.md" \
            --exclude "README.md"

          echo "ZIP_PATH=$ZIP" >> "$GITHUB_OUTPUT"
          echo "Archivos incluidos: $(unzip -l $ZIP | tail -1)"

      - name: Extraer notas del CHANGELOG
        if: steps.tag_check.outputs.EXISTS == 'false'
        id: notes
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed '/^$/d' | head -50)
          if [ -z "$NOTES" ]; then
            NOTES="Versión ${VERSION}"
          fi
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Crear tag y Release en GitHub
        if: steps.tag_check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.VERSION }}"
          name: "Libro Contable v${{ steps.ver.outputs.VERSION }}"
          body: ${{ steps.notes.outputs.NOTES }}
          files: ${{ steps.zip.outputs.ZIP_PATH }}
          draft: false
          prerelease: false
