name: Release

on:
  push:
    branches:
      - main

# No ejecutar si el commit es el auto-bump del bot, ni si lleva [no-release]
jobs:
  release:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[no-release]')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump versión PATCH
        id: ver
        run: |
          CURRENT=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo -n "$NEW" > VERSION
          echo "VERSION=$NEW" >> "$GITHUB_OUTPUT"
          echo "Versión: $CURRENT → $NEW"

      - name: Commitear nueva versión
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.ver.outputs.VERSION }} [skip ci]"
          git push origin main

      - name: Construir ZIP limpio
        id: zip
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          ZIP="contable_v${VERSION}.zip"

          zip -r "$ZIP" . \
            --exclude "*.git/*" \
            --exclude "*.git" \
            --exclude ".claude/*" \
            --exclude ".agent/*" \
            --exclude "tools/*" \
            --exclude "backups/*" \
            --exclude ".well-known/*" \
            --exclude "config/database.php" \
            --exclude "config/.installed" \
            --exclude "*.zip" \
            --exclude ".gitignore" \
            --exclude "error_log" \
            --exclude "Thumbs.db" \
            --exclude "CLAUDE.md" \
            --exclude "AGENTS.md" \
            --exclude "CONVENTIONS.md" \
            --exclude "DATABASE.md" \
            --exclude "SECURITY.md" \
            --exclude "README.md"

          echo "ZIP_PATH=$ZIP" >> "$GITHUB_OUTPUT"
          echo "Archivos incluidos: $(unzip -l $ZIP | tail -1)"

      - name: Extraer notas del CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.ver.outputs.VERSION }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed '/^$/d' | head -50)
          if [ -z "$NOTES" ]; then
            NOTES="Versión ${VERSION}"
          fi
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.VERSION }}"
          name: "Libro Contable v${{ steps.ver.outputs.VERSION }}"
          body: ${{ steps.notes.outputs.NOTES }}
          files: ${{ steps.zip.outputs.ZIP_PATH }}
          draft: false
          prerelease: false
